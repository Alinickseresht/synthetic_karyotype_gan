
# (example config)
data:
  raw_path: "data/raw/chromosomes"
  processed_path: "data/processed"
  image_size: 128
  batch_size: 32

model:
  type: "stylegan2"  # or "conditional_gan"
  latent_dim: 512
  n_classes: 24      # 24 classes of human chromosomes

training:
  epochs: 100
  learning_rate: 0.002
  n_critic: 1
  save_interval: 10

generation:
  num_images: 1000
  truncation_psi: 0.7
  output_dir: "data/synthetic"
